name: Setup & First Deploy

# Ce workflow se déclenche uniquement via appel manuel (workflow_dispatch)
# ou lors du premier push sur main (détecter si c'est le premier commit du template)
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  verify-setup:
    name: Vérifier la configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Vérifier les secrets requis
        run: |
          MISSING=()
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && MISSING+=("VERCEL_TOKEN")
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && MISSING+=("VERCEL_ORG_ID")
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && MISSING+=("VERCEL_PROJECT_ID")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Secrets manquants : ${MISSING[*]}"
            echo ""
            echo "→ Configurer dans : GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi

          echo "✅ Tous les secrets sont configurés"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint 2>/dev/null || echo "⚠️ Lint non configuré"

  deploy-preview:
    name: Premier déploiement preview
    needs: verify-setup
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Deploy to Vercel preview
        id: deploy
        run: |
          URL=$(vercel deploy --token=$VERCEL_TOKEN 2>&1 | grep -E "^https://" | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Preview déployé : $URL"

      - name: Résumé
        if: always()
        run: |
          echo "## Résultat du setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preview URL | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
