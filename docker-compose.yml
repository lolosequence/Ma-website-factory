# docker-compose.yml — Développement local uniquement
# Lance uniquement la base de données PostgreSQL.
# L'application Next.js/Payload tourne en dehors de Docker (npm run dev).
#
# Usage :
#   docker compose up -d        # démarrer Postgres
#   docker compose down         # arrêter
#   docker compose down -v      # arrêter + supprimer les données

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payload}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payload}
      POSTGRES_DB: ${POSTGRES_DB:-payload}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payload} -d ${POSTGRES_DB:-payload}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
